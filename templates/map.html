{% extends "base.html" %}
{% load static %}

{% block title %}| Interactive Map{% endblock %}

{% block body %}
<style>
    /* Override container padding for full-width map */
    .map-page-wrapper {
        position: relative;
        display: flex;
        flex-direction: row;
        height: 100vh;
        width: 100vw;
        background: #0F0F0F;
        overflow: hidden;
    }

    #map {
        flex: 1;
        height: 100%;
        border-radius: 0;
        min-width: 0;
    }

    /* Push Leaflet controls below the navbar */
    .leaflet-top {
        margin-top: 80px;
    }

    /* Loading spinner */
    .loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2000;
        background: rgba(5, 5, 5, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
    }

    .loading.hidden {
        display: none;
    }

    .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(0, 230, 118, 0.15);
        border-top-color: #00E676;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    .loading p {
        color: #A0A0A0;
        font-size: 0.95rem;
        font-weight: 500;
        margin: 0;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Station label on map */
    .station-label {
        background: rgba(0, 230, 118, 0.9);
        color: #050505;
        border: none;
        padding: 3px 6px;
        font-size: 11px;
        font-weight: 700;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* ===== Legend Panel ===== */
    .map-legend {
        width: 320px;
        flex-shrink: 0;
        background: #121212;
        padding: 24px;
        border-left: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 1000;
        overflow-y: auto;
        height: 100%;
    }

    .map-legend::-webkit-scrollbar {
        width: 4px;
    }

    .map-legend::-webkit-scrollbar-track {
        background: transparent;
    }

    .map-legend::-webkit-scrollbar-thumb {
        background: rgba(0, 230, 118, 0.3);
        border-radius: 4px;
    }

    .map-legend h4 {
        margin: 0 0 16px 0;
        font-size: 1rem;
        font-weight: 700;
        color: #F0F0F0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        letter-spacing: 0.5px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
        padding: 8px 10px;
        border-radius: 8px;
        transition: all 0.2s ease;
        cursor: pointer;
        border: 1px solid transparent;
    }

    .legend-item:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.08);
    }

    .legend-color-box {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        flex-shrink: 0;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        position: relative;
    }

    .legend-color-box::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.1) 100%);
    }

    .legend-color {
        width: 100%;
        height: 100%;
        border-radius: 8px;
    }

    .legend-details {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
    }

    .legend-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #F0F0F0;
    }

    .legend-sublabel {
        font-size: 0.75rem;
        color: #666;
        font-weight: 400;
    }

    .legend-toggle {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 2px solid #444;
        background: transparent;
        flex-shrink: 0;
        transition: all 0.2s ease;
        position: relative;
    }

    .legend-toggle.active {
        background: #00E676;
        border-color: #00E676;
    }

    .legend-toggle.active::after {
        content: '✓';
        position: absolute;
        color: #050505;
        font-size: 11px;
        font-weight: bold;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    .route-stats {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
        color: #666;
        text-align: center;
    }

    .route-stats strong {
        color: #00E676;
    }

    /* ===== Mobile Legend Toggle Button ===== */
    .legend-mobile-toggle {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1001;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00E676, #00C853);
        border: none;
        color: #050505;
        font-size: 1.3rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
        transition: all 0.25s ease;
        align-items: center;
        justify-content: center;
    }

    .legend-mobile-toggle:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 28px rgba(0, 230, 118, 0.4);
    }

    /* ===== Mobile Responsive ===== */
    @media (max-width: 768px) {
        .map-page-wrapper {
            display: block;
            height: 100vh;
            width: 100vw;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        .map-legend {
            position: fixed;
            width: auto;
            height: auto;
            flex-shrink: initial;
            top: auto;
            right: 0;
            left: 0;
            bottom: 0;
            max-height: 50vh;
            border-left: none;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1002;
        }

        .map-legend.open {
            transform: translateY(0);
        }

        .map-legend h4 {
            font-size: 0.95rem;
            position: relative;
        }

        /* Drag handle */
        .map-legend::before {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 0 auto 12px auto;
        }

        .legend-mobile-toggle {
            display: flex;
        }

        /* Overlay behind legend */
        .legend-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
        }

        .legend-overlay.open {
            display: block;
        }
    }

    @media (max-width: 480px) {
        .map-legend {
            max-height: 60vh;
        }
    }
</style>

<div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p>Loading map data...</p>
</div>

<div class="map-page-wrapper">
    <div id="map"></div>

    <div class="map-legend" id="mapLegend">
        <h4>Routes</h4>
        <div id="legendContent"></div>
    </div>

    <!-- Mobile legend toggle button -->
    <button class="legend-mobile-toggle" id="legendToggle" aria-label="Toggle route legend">
        ☰
    </button>

    <!-- Mobile overlay -->
    <div class="legend-overlay" id="legendOverlay"></div>
</div>

<!-- Leaflet CSS & JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Mobile legend toggle
    const legendPanel = document.getElementById('mapLegend');
    const legendToggle = document.getElementById('legendToggle');
    const legendOverlay = document.getElementById('legendOverlay');

    function toggleLegend() {
        const isOpen = legendPanel.classList.contains('open');
        legendPanel.classList.toggle('open');
        legendOverlay.classList.toggle('open');
        legendToggle.textContent = isOpen ? '☰' : '✕';
    }

    legendToggle.addEventListener('click', toggleLegend);
    legendOverlay.addEventListener('click', toggleLegend);

    // Route colors
    const routeColors = {
        "EV1": "#0066CC",
        "EV2": "#00AA00",
        "EV3": "#FF1493",
        "EV4": "#8B008B",
        "EV5": "#FF6600",
        "R1": "#FFD700",
        "R2": "#8B4513",
        "R3": "#32CD32",
        "R4": "#1E90FF",
        "R8": "#FF69B4",
        "R9": "#4169E1",
        "R10": "#FF4500",
        "R11": "#9370DB",
        "R12": "#20B2AA",
        "R13": "#DC143C",
        "OL": "#FFA500",
        "GL": "#228B22"
    };

    const routeNames = {
        "EV1": { name: "EV1 - Malir Cantt to Dolmen", short: "EV-BUS" },
        "EV2": { name: "EV2 - Bahria Town to Malir", short: "EV-BUS" },
        "EV3": { name: "EV3 - Malir to Numaish", short: "EV-BUS" },
        "EV4": { name: "EV4 - Bahria to Ayesha Manzil", short: "EV-BUS" },
        "EV5": { name: "EV5 - DHA City to Sohrab Goth", short: "EV-BUS" },
        "R1": { name: "R1 - Khokhrapar to Dockyard", short: "Red Line" },
        "R2": { name: "R2 - Power House to Indus", short: "Red Line" },
        "R3": { name: "R3 - Power House to Nasir Jump", short: "Red Line" },
        "R4": { name: "R4 - Power House to Keamari", short: "Red Line" },
        "R8": { name: "R8 - Tower to Yousuf Goth", short: "Red Line" },
        "R9": { name: "R9 - Gulshan e Hadeed to Tower", short: "Red Line" },
        "R10": { name: "R10 - Numaish to Ibrahim Hyderi", short: "Red Line" },
        "R11": { name: "R11 - Miran Nakka to Shireen Jinnah", short: "Red Line" },
        "R12": { name: "R12 - Naddi Kinara to Indus", short: "Red Line" },
        "R13": { name: "R13 - Tower to Hawks Bay", short: "Red Line" },
        "OL": { name: "Orange Line", short: "Orange" },
        "GL": { name: "Green Line - Power House to Guru Mandir", short: "Green" }
    };

    // Initialize map with DARK tiles
    const map = L.map("map").setView([24.8607, 67.0011], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &amp; CARTO'
    }).addTo(map);

    // Store route layers for toggling
    const routeLayerGroups = {};

    // Load and display data
    async function initializeMap() {
        const loading = document.getElementById('loading');
        loading.classList.remove('hidden');

        try {
            // Fetch data from Django APIs
            const [stationsRes, routesRes] = await Promise.all([
                fetch('/api/stations/'),
                fetch('/api/routes/')
            ]);

            const stations = await stationsRes.json();
            const routes = await routesRes.json();

            console.log(`Loaded ${stations.length} stations and ${routes.length} route segments`);

            // Create station map for quick lookup
            const stationMap = {};
            stations.forEach(s => {
                stationMap[s.station_id] = [s.lat, s.lng];
            });

            // Draw stations
            stations.forEach(s => {
                const marker = L.circleMarker([s.lat, s.lng], {
                    radius: 5,
                    color: "#00E676",
                    fillColor: "#0F0F0F",
                    fillOpacity: 1,
                    weight: 2
                }).addTo(map);

                marker.bindPopup(`<strong style="color:#00E676">${s.station_name}</strong>`);

                // Add hover effect
                marker.on('mouseover', function() {
                    this.setStyle({ radius: 8, weight: 3, fillColor: "#00E676" });
                });
                marker.on('mouseout', function() {
                    this.setStyle({ radius: 5, weight: 2, fillColor: "#0F0F0F" });
                });
            });

            // Group routes by route_id
            const routeGroups = {};
            routes.forEach(r => {
                if (!routeGroups[r.route_id]) {
                    routeGroups[r.route_id] = [];
                }
                routeGroups[r.route_id].push([
                    [r.from_lat, r.from_lng],
                    [r.to_lat, r.to_lng]
                ]);
            });

            // Draw routes
            Object.keys(routeGroups).forEach(routeId => {
                const color = routeColors[routeId] || "#666666";
                
                // Create a layer group for this route
                const layerGroup = L.layerGroup();
                
                routeGroups[routeId].forEach(segment => {
                    // Draw a dark outline underneath to separate from roads
                    const outline = L.polyline(segment, {
                        color: '#1a1a1a',
                        weight: 7,
                        opacity: 0.6,
                        lineJoin: 'round',
                        lineCap: 'round'
                    });
                    layerGroup.addLayer(outline);

                    // Draw the actual route line
                    const line = L.polyline(segment, {
                        color: color,
                        weight: 3,
                        opacity: 1.0,
                        lineJoin: 'round',
                        lineCap: 'round'
                    });
                    layerGroup.addLayer(line);
                });
                
                // Add to map and store reference
                layerGroup.addTo(map);
                routeLayerGroups[routeId] = layerGroup;
            });

            // Create legend with toggle functionality
            const legendContent = document.getElementById('legendContent');
            let totalStations = stations.length;
            let totalRoutes = Object.keys(routeGroups).length;
            
            Object.keys(routeGroups).forEach(routeId => {
                const routeInfo = routeNames[routeId];
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.setAttribute('data-route', routeId);
                
                item.innerHTML = `
                    <div class="legend-color-box" style="background: ${routeColors[routeId] || '#666'}">
                        <div class="legend-color"></div>
                    </div>
                    <div class="legend-details">
                        <span class="legend-label">${routeId}</span>
                        <span class="legend-sublabel">${routeInfo ? routeInfo.short : 'Route'}</span>
                    </div>
                    <div class="legend-toggle active"></div>
                `;
                
                // Toggle route visibility on click
                item.addEventListener('click', function() {
                    const toggle = this.querySelector('.legend-toggle');
                    const isActive = toggle.classList.contains('active');
                    
                    if (isActive) {
                        // Hide route
                        map.removeLayer(routeLayerGroups[routeId]);
                        toggle.classList.remove('active');
                        this.style.opacity = '0.4';
                    } else {
                        // Show route
                        routeLayerGroups[routeId].addTo(map);
                        toggle.classList.add('active');
                        this.style.opacity = '1';
                    }
                });
                
                legendContent.appendChild(item);
            });
            
            // Add stats at the bottom
            const stats = document.createElement('div');
            stats.className = 'route-stats';
            stats.innerHTML = `
                <strong>${totalStations}</strong> Stations · <strong>${totalRoutes}</strong> Routes
            `;
            legendContent.appendChild(stats);

        } catch (error) {
            console.error('Error loading map:', error);
            alert('Error loading map data. Check console for details.');
        } finally {
            loading.classList.add('hidden');
        }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initializeMap);
</script>

{% endblock %}
